<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link href="/static/style.css" rel="stylesheet">

    <title>Store Manager: {% block title %}{% endblock %}</title>

</head>
<body>
    <nav class="bg-light border navbar navbar-expand-md navbar-light px-2">
            {% if session["user_id"] %}
            <ul class="navbar-nav m-0">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="">Add</a></li>
                <li class="nav-item"><a class="nav-link" href="">Sell</a></li>
                <li class="nav-item"><a class="nav-link" href="">History</a></li>
            </ul>
            <ul class="navbar-nav m-0">
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            {% else %}
            <ul class="navbar-nav ms auto mt-2">
                <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
                <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
            </ul>
            {% endif %}
    </nav>
    <main class="container-fluid p-0 text-center">
            {% block main %}{% endblock %}
        </main>
</body>
</html>
